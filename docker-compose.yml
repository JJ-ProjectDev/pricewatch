services:
  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    container_name: pricewatch-web
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:${API_GATEWAY_PORT:-3000}"
    volumes:
      - ./services/web:/repo/services/web
      - web_node_modules:/repo/node_modules
      - web_service_node_modules:/repo/services/web/node_modules
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: pricewatch-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATABASE_URL: "${DATABASE_URL:-postgresql://pricewatch:pricewatch_dev_password@postgres:5432/pricewatch}"
      JWT_SECRET: "${JWT_SECRET:-pricewatch_dev_jwt_secret_change_me}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-15m}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      RABBITMQ_URL: "${RABBITMQ_URL:-amqp://pricewatch:pricewatch_dev_password@rabbitmq:5672}"
    volumes:
      - ./services/api-gateway:/repo/services/api-gateway
      - api_gateway_node_modules:/repo/node_modules
      - api_gateway_service_node_modules:/repo/services/api-gateway/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: pricewatch-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-pricewatch}"
      POSTGRES_USER: "${POSTGRES_USER:-pricewatch}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pricewatch_dev_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pricewatch-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: pricewatch-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER:-pricewatch}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS:-pricewatch_dev_password}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  web_node_modules:
  web_service_node_modules:
  api_gateway_node_modules:
  api_gateway_service_node_modules:
  postgres_data:
  redis_data:
  rabbitmq_data:
